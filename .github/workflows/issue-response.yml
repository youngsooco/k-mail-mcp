name: Issue Auto Response

on:
  issues:
    types: [opened]

# 봇이 코멘트를 달 수 있도록 write 권한 필요
permissions:
  issues: write
  contents: read

jobs:
  respond:
    runs-on: ubuntu-latest
    # 봇이 만든 이슈는 무시 (무한루프 방지)
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Respond to issue with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueTitle  = context.payload.issue.title;
            const issueBody   = context.payload.issue.body || "(본문 없음)";
            const issueNumber = context.payload.issue.number;
            const issueAuthor = context.payload.issue.user.login;

            // Claude에게 보낼 프롬프트
            const systemPrompt = `
You are a helpful maintainer assistant for K-Mail-MCP, an open-source MCP plugin that connects Korean mail services (Naver, Daum/Kakao, Gmail) to Claude AI via IMAP.

Project context:
- MCP server written in Node.js (ES modules)
- Uses IMAP protocol to connect Naver, Daum, Gmail
- AES-256-GCM encryption for stored credentials (email + password)
- Tools: check_new_mails, list_accounts, read_email, reset_last_run, list_mailboxes
- Runs as Claude Desktop plugin (stdio transport)
- Supports Windows, macOS, Linux (iOS/Android: not yet)

Common issues:
- IMAP auth errors → usually wrong app password or IMAP not enabled in mail settings
- MCP not showing in Claude Desktop → wrong path in claude_desktop_config.json or not restarted
- .master.key missing → need to run node setup.js first
- Daum mail folder name → auto-detected but may need list_mailboxes to verify
- Windows path requires double backslash in JSON config

When responding:
1. Write in Korean (한국어로 답변)
2. Be friendly and specific — give concrete steps, not vague advice
3. If it's a bug report, acknowledge it and ask for: OS, Node.js version, error message
4. If it's a feature request, evaluate feasibility against the IMAP-based architecture
5. If it's a question, answer directly with numbered steps
6. End with: "추가로 궁금한 점이 있으면 편하게 댓글 달아주세요 🙏"
7. Keep response under 400 words
8. Do NOT say you are an AI in the response — respond as the maintainer assistant
            `.trim();

            const userPrompt = `
New GitHub issue from @${issueAuthor}:

Title: ${issueTitle}

Body:
${issueBody}

Please respond helpfully to this issue.
            `.trim();

            // Anthropic API 호출
            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
              },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1024,
                system: systemPrompt,
                messages: [{ role: "user", content: userPrompt }],
              }),
            });

            if (!response.ok) {
              const err = await response.text();
              core.setFailed(`Anthropic API error: ${err}`);
              return;
            }

            const data = await response.json();
            const reply = data.content?.[0]?.text || "응답을 생성할 수 없었습니다.";

            // 이슈에 코멘트 달기
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              body: `${reply}\n\n---\n*🤖 이 답변은 AI 메인테이너가 자동으로 작성했습니다. 답변이 부정확하면 댓글로 알려주세요.*`,
            });

            // 이슈에 라벨 추가 (선택)
            try {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issueNumber,
                labels:       ["needs-triage"],
              });
            } catch (e) {
              // 라벨이 없으면 무시
            }

            core.info(`✅ Responded to issue #${issueNumber}`);
