name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # 코드 파일 변경 시에만 실행
    paths:
      - "**.js"
      - "**.json"
      - "**.yml"
      - "**.md"

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          # 변경된 파일 목록
          git diff origin/${{ github.base_ref }}...HEAD --name-only > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

          # diff 내용 (최대 8000자로 제한)
          git diff origin/${{ github.base_ref }}...HEAD -- '*.js' '*.json' \
            | head -c 8000 > pr_diff.txt

          echo "Diff size: $(wc -c < pr_diff.txt) bytes"

      - name: Review PR with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require("fs");
            const prNumber  = context.payload.pull_request.number;
            const prTitle   = context.payload.pull_request.title;
            const prBody    = context.payload.pull_request.body || "(설명 없음)";
            const prAuthor  = context.payload.pull_request.user.login;

            const changedFiles = fs.readFileSync("changed_files.txt", "utf-8").trim();
            const diff         = fs.readFileSync("pr_diff.txt",       "utf-8").trim();

            const systemPrompt = `
You are a senior code reviewer for K-Mail-MCP, an open-source Node.js MCP plugin.

Project architecture:
- index.js: MCP server (ES modules, @modelcontextprotocol/sdk, imap, mailparser)
- setup.js: CLI for account registration with AES-256-GCM encryption
- Credentials stored encrypted: encUser (email) + encPass (password)
- .master.key: 256-bit key, instance-specific, never committed
- IMAP connections are per-request, always closed in finally blocks
- Tools exposed: check_new_mails, list_accounts, read_email, reset_last_run, list_mailboxes

Review priorities (in order):
1. 🔐 SECURITY: credential handling, encryption, key exposure, plaintext leaks
2. 🐛 BUGS: IMAP connection leaks, unhandled rejections, edge cases
3. ⚡ PERFORMANCE: unnecessary full-body fetches, missing connection cleanup
4. 📖 READABILITY: naming, comments, consistency with existing style
5. ✅ CORRECTNESS: IMAP protocol usage, date filtering logic, MCP tool schemas

Output format (Korean 한국어):
- Start with a brief overall assessment (1-2 sentences)
- List findings with emoji prefix: 🔐 보안 / 🐛 버그 / ⚡ 성능 / 📖 가독성 / ✅ 일반
- For each finding: what the issue is + concrete suggestion or code snippet
- End with: 전반적인 평가: LGTM ✅ / 수정 후 머지 가능 ⚠️ / 수정 필요 ❌
- Keep under 600 words
            `.trim();

            const userPrompt = `
PR #${prNumber} by @${prAuthor}: "${prTitle}"

Description:
${prBody}

Changed files:
${changedFiles}

Diff:
\`\`\`diff
${diff || "(diff 없음 — 문서 변경만 포함)"}
\`\`\`

Please review this PR focusing on security, correctness, and code quality.
            `.trim();

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
              },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1500,
                system: systemPrompt,
                messages: [{ role: "user", content: userPrompt }],
              }),
            });

            if (!response.ok) {
              const err = await response.text();
              core.setFailed(`Anthropic API error: ${err}`);
              return;
            }

            const data   = await response.json();
            const review = data.content?.[0]?.text || "리뷰를 생성할 수 없었습니다.";

            // PR에 리뷰 코멘트 달기
            await github.rest.pulls.createReview({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: prNumber,
              event:       "COMMENT",
              body: `## 🤖 AI 코드 리뷰\n\n${review}\n\n---\n*Claude Sonnet이 자동으로 검토했습니다. 메인테이너의 최종 승인이 필요합니다.*`,
            });

            core.info(`✅ Reviewed PR #${prNumber}`);
