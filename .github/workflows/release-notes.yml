name: Auto Release Notes

on:
  push:
    tags:
      - "v*"

# [SECURITY] 태그 연속 push 시 이전 실행 취소 — 경합 방지
concurrency:
  group: release-notes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # contents: write — GitHub Releases 생성/수정에 필요한 최소 권한
  # 다른 권한(issues, pull-requests, actions)은 명시적으로 차단
  contents: write
  issues: none
  pull-requests: none
  actions: none

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # [SECURITY] 봇 걸림 방지 — 최대 10분
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get commits since last tag
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_ENV
          if [ -z "$PREV_TAG" ]; then
            git log --oneline --no-merges | head -30 > /tmp/commits.txt
          else
            git log ${PREV_TAG}..HEAD --oneline --no-merges | head -30 > /tmp/commits.txt
          fi

      - name: Generate release notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ env.CURRENT_TAG }}
          PREV_TAG: ${{ env.PREV_TAG }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node .github/scripts/release-notes.js
        